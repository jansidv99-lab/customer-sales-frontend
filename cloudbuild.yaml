# cloudbuild.yaml — customer-sales-frontend
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        # Install Helm
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

        # Authenticate to GKE cluster
        gcloud container clusters get-credentials customer-sales-cluster \
          --region=us-central1 \
          --project=$PROJECT_ID

        # Create namespace only if it does not already exist
        kubectl get namespace customer-sales || \
          kubectl create namespace customer-sales

        # Run Helm upgrade — no --create-namespace flag needed now
        helm upgrade --install frontend k8s/helm/frontend \
          --namespace=customer-sales \
          --set=image.tag=$COMMIT_SHA \
          --set=image.repository=us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend \
          --wait \
          --timeout=3m

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY