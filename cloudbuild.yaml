# cloudbuild.yaml — customer-sales-frontend
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:latest'

  # Step 4: Authenticate to GKE — volume declared HERE
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'customer-sales-cluster'
      - '--region=us-central1'
      - '--project=$PROJECT_ID'
    volumes:
      - name: kubeconfig
        path: /root/.kube

  # Step 5: Helm upgrade — volume mounted HERE too
  - name: 'alpine/helm:3.14.0'
    entrypoint: helm
    args:
      - 'upgrade'
      - '--install'
      - 'frontend'
      - 'k8s/helm/frontend'
      - '--namespace=customer-sales'
      - '--create-namespace'
      - '--set=image.tag=$COMMIT_SHA'
      - '--set=image.repository=us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend'
      - '--wait'
      - '--timeout=3m'
    volumes:
      - name: kubeconfig
        path: /root/.kube

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY