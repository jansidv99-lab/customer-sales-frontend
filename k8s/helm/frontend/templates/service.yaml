# templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  annotations:
    # GCP annotation — provisions a regional external LoadBalancer
    cloud.google.com/load-balancer-type: "External"
spec:
  type: {{ .Values.service.type }}

  # Selector must match selectorLabels in deployment template exactly
  selector:
    {{- include "frontend.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}           # External port (80)
      targetPort: {{ .Values.service.targetPort }} # Container port (8501)

  # External traffic policy — preserves client source IP in logs
  # Use Cluster (default) on free tier to avoid node port restrictions
  externalTrafficPolicy: Cluster