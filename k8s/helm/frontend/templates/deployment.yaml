# templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  annotations:
    # Tracks which commit SHA is currently deployed — visible in kubectl describe
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}

  # Rolling update — ensures zero downtime deployments
  # maxUnavailable: 0 means old pod stays up until new one passes readiness probe
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}

  template:
    metadata:
      labels:
        {{- include "frontend.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when ConfigMap changes — Kubernetes doesn't do this automatically
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}

    spec:
      # Use the service account with Workload Identity annotation
      serviceAccountName: {{ .Values.serviceAccount.name }}

      # Graceful shutdown — give Streamlit 30s to finish in-flight requests
      terminationGracePeriodSeconds: 30

      # Security context — run as non-root for security best practice
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # Pull all env vars from ConfigMap
          envFrom:
            - configMapRef:
                name: {{ include "frontend.configmapName" . }}

          # Liveness probe — if this fails 3 times, Kubernetes kills and restarts the pod
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          # Readiness probe — if this fails, pod is removed from Service endpoints
          # No traffic is sent to it until it passes again
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          # Resource requests — what the scheduler uses to find a node with capacity
          # Resource limits — hard ceiling, pod is killed if it exceeds memory limit
          resources:
            requests:
              cpu:    {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu:    {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # Container security — read-only filesystem except for Streamlit temp dirs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Streamlit needs to write temp files
            capabilities:
              drop:
                - ALL