# templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.configmapName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  # Injected into the Streamlit container as an environment variable
  # app/main.py reads: os.getenv("BACKEND_URL")
  BACKEND_URL: {{ .Values.config.backendUrl | quote }}