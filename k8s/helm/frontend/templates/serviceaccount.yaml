# templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  annotations:
    # Workload Identity — binds this Kubernetes SA to the GCP SA
    # This is what allows the pod to make authenticated GCP API calls
    # without mounting any JSON key files
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount }}